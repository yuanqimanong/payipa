<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>任务管理 - PaYiPa</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        /* 任务表单样式 */
        .task-form-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            max-width: 800px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #111827;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            color: #ffffff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #6b7280;
            border: 1px solid #d1d5db;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        /* 任务列表样式 */
        .task-list-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .task-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #e5e7eb;
        }

        .task-list-header h2 {
            font-size: 1.1rem;
            color: #111827;
            margin: 0;
        }

        .task-count {
            background: #dbeafe;
            color: #2563eb;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .task-table {
            width: 100%;
            border-collapse: collapse;
        }

        .task-table th {
            background: #f9fafb;
            padding: 14px 20px;
            text-align: left;
            font-weight: 600;
            color: #6b7280;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-table td {
            padding: 16px 20px;
            border-bottom: 1px solid #e5e7eb;
            color: #111827;
            font-size: 0.9rem;
        }

        .task-table tr:hover {
            background: #f9fafb;
        }

        .task-table tr.deleted-row {
            background: #fafafa;
            opacity: 0.7;
        }

        .task-name {
            font-weight: 600;
            color: #111827;
        }

        .task-group-badge {
            display: inline-block;
            padding: 4px 10px;
            background: #dbeafe;
            color: #2563eb;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .task-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .task-status.pending { background: #fef3c7; color: #92400e; }
        .task-status.running { background: #d1fae5; color: #065f46; }
        .task-status.completed { background: #dbeafe; color: #1e40af; }
        .task-status.failed { background: #fee2e2; color: #991b1b; }
        .task-status.stopped { background: #e5e7eb; color: #374151; }

        .delete-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .delete-badge.deleted { background: #fee2e2; color: #991b1b; }
        .delete-badge.normal { background: #d1fae5; color: #065f46; }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .action-btn.start { background: #d1fae5; color: #065f46; }
        .action-btn.start:hover { background: #10b981; color: #ffffff; }
        .action-btn.stop { background: #fef3c7; color: #92400e; }
        .action-btn.stop:hover { background: #f59e0b; color: #ffffff; }
        .action-btn.delete { background: #fee2e2; color: #991b1b; }
        .action-btn.delete:hover { background: #ef4444; color: #ffffff; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        /* 提示框 */
        .alert {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        /* 内部导航标签 */
        .nav-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .nav-tab {
            padding: 10px 20px;
            background: #f3f4f6;
            border: none;
            border-radius: 8px;
            color: #6b7280;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-tab:hover {
            background: #e5e7eb;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            color: #ffffff;
        }

        /* 加载状态 */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .task-table {
                font-size: 0.8rem;
            }

            .task-table th,
            .task-table td {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
<div id="app">
    <!-- 加载中状态 -->
    <div class="loading-state" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;"
         v-if="isLoading">
        <div>
            <div class="loading-spinner"></div>
            <p>加载中...</p>
        </div>
    </div>

    <!-- 未登录状态 -->
    <login-prompt v-if="!isLoggedIn && !isLoading"></login-prompt>

    <!-- 已登录状态 -->
    <div class="app-layout" v-if="isLoggedIn && !isLoading">
        <app-sidebar active-page="task" v-bind:user-info="userInfo"></app-sidebar>

        <div class="main-wrapper">
            <app-header v-bind:login-time="loginTime" v-bind:user-info="userInfo"></app-header>

            <main class="main-content">
                <!-- 内部导航标签 -->
                <div class="nav-tabs">
                    <button class="nav-tab" v-bind:class="{ active: activeNav === 'create-task' }"
                            v-on:click="setActiveNav('create-task')">
                        📝 新建任务
                    </button>
                    <button class="nav-tab" v-bind:class="{ active: activeNav === 'view-tasks' }"
                            v-on:click="setActiveNav('view-tasks')">
                        📋 查看任务
                    </button>
                </div>

                <!-- 提示信息 -->
                <div v-bind:class="['alert', alertType === 'success' ? 'alert-success' : 'alert-error']"
                     v-if="alertMessage">
                    {{ alertMessage }}
                </div>

                <!-- 新建任务页面 -->
                <div v-if="activeNav === 'create-task'">
                    <page-header icon="📝" subtitle="创建新的数据采集任务" title="新建任务"></page-header>

                    <div class="task-form-card">
                        <form v-on:submit.prevent="createTask">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="taskName">任务名称 *</label>
                                    <input id="taskName" placeholder="请输入任务名称" required type="text"
                                           v-model="taskForm.task_name">
                                </div>
                                <div class="form-group">
                                    <label for="taskGroup">任务分组 *</label>
                                    <select id="taskGroup" required v-model="taskForm.task_group">
                                        <option value="">请选择分组</option>
                                        <option value="reddit">Reddit</option>
                                        <option value="twitter">Twitter/X</option>
                                        <option value="facebook">Facebook</option>
                                        <option value="instagram">Instagram</option>
                                        <option value="youtube">YouTube</option>
                                        <option value="linkedin">LinkedIn</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="sourcePlatform">数据来源平台</label>
                                    <input id="sourcePlatform" placeholder="例如: reddit.com" type="text"
                                           v-model="taskForm.source_platform">
                                </div>
                                <div class="form-group">
                                    <label for="targetUrl">目标URL</label>
                                    <input id="targetUrl" placeholder="请输入目标URL" type="text"
                                           v-model="taskForm.task_content.target_url">
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="keywords">关键词（多个用逗号分隔）</label>
                                <input id="keywords" placeholder="例如: 科技, AI, 机器学习" type="text"
                                       v-model="taskForm.task_content.keywords">
                            </div>

                            <div class="form-group">
                                <label for="description">任务描述</label>
                                <textarea id="description" placeholder="请输入任务描述"
                                          v-model="taskForm.task_content.description"></textarea>
                            </div>

                            <div class="form-actions">
                                <button class="btn btn-primary" type="submit" v-bind:disabled="isSubmitting">
                                    {{ isSubmitting ? '创建中...' : '创建任务' }}
                                </button>
                                <button class="btn btn-secondary" type="button" v-on:click="resetForm">重置</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- 查看任务页面 -->
                <div v-if="activeNav === 'view-tasks'">
                    <page-header
                            icon="📋"
                            v-bind:subtitle="userInfo.is_superuser ? '查看和管理系统中的所有任务（包括已删除）' : '查看和管理您创建的所有任务'"
                            v-bind:title="userInfo.is_superuser ? '所有任务' : '我的任务'">
                    </page-header>

                    <div class="task-list-card">
                        <div class="task-list-header">
                            <h2>任务列表</h2>
                            <span class="task-count">共 {{ tasks.length }} 个任务</span>
                        </div>

                        <!-- 加载任务数据 -->
                        <div class="loading-state" v-if="isLoadingTasks">
                            <div class="loading-spinner"></div>
                            <p>正在加载任务列表...</p>
                        </div>

                        <!-- 任务列表 -->
                        <div v-if="!isLoadingTasks && tasks.length > 0">
                            <table class="task-table">
                                <thead>
                                <tr>
                                    <th>任务名称</th>
                                    <th>分组</th>
                                    <th>平台</th>
                                    <th>状态</th>
                                    <th v-if="userInfo.is_superuser">删除</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr v-bind:class="{ 'deleted-row': task.is_delete }" v-bind:key="task.id"
                                    v-for="task in tasks">
                                    <td class="task-name">{{ task.task_name }}</td>
                                    <td><span class="task-group-badge">{{ task.task_group }}</span></td>
                                    <td>{{ task.source_platform || '-' }}</td>
                                    <td>
                                        <span class="task-status" v-bind:class="getStatusClass(task.status)">
                                            {{ getStatusText(task.status) }}
                                        </span>
                                    </td>
                                    <td v-if="userInfo.is_superuser">
                                        <span class="delete-badge" v-bind:class="task.is_delete ? 'deleted' : 'normal'">
                                            {{ task.is_delete ? '已删除' : '正常' }}
                                        </span>
                                    </td>
                                    <td>{{ formatDate(task.created_at) }}</td>
                                    <td class="task-actions">
                                        <template v-if="!task.is_delete">
                                            <button class="action-btn start"
                                                    v-if="task.status === 0 || task.status === -2"
                                                    v-on:click="startTask(task.id)">
                                                启动
                                            </button>
                                            <button class="action-btn stop"
                                                    v-if="task.status === 1 || task.status === 2"
                                                    v-on:click="stopTask(task.id)">
                                                停止
                                            </button>
                                            <button class="action-btn delete" v-on:click="deleteTask(task.id)">
                                                删除
                                            </button>
                                        </template>
                                        <span style="color: #999; font-size: 0.8rem;" v-else>-</span>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- 空状态 -->
                        <div class="empty-state" v-if="!isLoadingTasks && tasks.length === 0">
                            <div class="empty-state-icon">📭</div>
                            <p>暂无任务，快去创建一个吧！</p>
                            <button class="btn btn-primary" v-on:click="setActiveNav('create-task')">新建任务</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>

<script src="/static/js/common.js"></script>
<script src="/static/js/components.js"></script>
<script>
    var createApp = Vue.createApp;
    var ref = Vue.ref;
    var onMounted = Vue.onMounted;

    var app = createApp({
        setup: function() {
            // 页面状态
            var isLoading = ref(true);
            var isLoggedIn = ref(false);
            var userInfo = ref({});
            var loginTime = ref('');
            var activeNav = ref('view-tasks');

            // 任务相关
            var tasks = ref([]);
            var isLoadingTasks = ref(false);
            var isSubmitting = ref(false);
            var alertMessage = ref('');
            var alertType = ref('success');

            // 新建任务表单
            var taskForm = ref({
                task_name: '',
                task_group: '',
                source_platform: '',
                task_content: {
                    target_url: '',
                    keywords: '',
                    description: ''
                }
            });

            // 获取 Token
            var getToken = function() {
                return localStorage.getItem('access_token');
            };

            // 获取请求头
            var getAuthHeaders = function() {
                var token = getToken();
                var headers = {
                    'Content-Type': 'application/json'
                };
                if (token) {
                    headers['Authorization'] = 'Bearer ' + token;
                }
                return headers;
            };

            // 设置导航
            var setActiveNav = function(nav) {
                activeNav.value = nav;
                alertMessage.value = '';
            };

            // 显示提示消息
            var showAlert = function(message, type) {
                alertMessage.value = message;
                alertType.value = type || 'success';
                setTimeout(function() {
                    alertMessage.value = '';
                }, 5000);
            };

            // 获取状态文本
            var getStatusText = function(status) {
                var statusMap = {
                    0: '待启动',
                    1: '启动中',
                    2: '运行中',
                    3: '已完成',
                    '-1': '失败',
                    '-2': '已停止'
                };
                return statusMap[status] || '未知';
            };

            // 获取状态样式类
            var getStatusClass = function(status) {
                var classMap = {
                    0: 'pending',
                    1: 'running',
                    2: 'running',
                    3: 'completed',
                    '-1': 'failed',
                    '-2': 'stopped'
                };
                return classMap[status] || 'pending';
            };

            // 格式化日期
            var formatDate = function(dateStr) {
                if (!dateStr) return '-';
                var date = new Date(dateStr);
                return date.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            };

            // 检查认证状态
            var checkAuth = async function() {
                var token = getToken();
                console.log('[Auth] Token:', token ? '存在' : '不存在');

                if (!token) {
                    return { isLoggedIn: false, userInfo: null };
                }

                try {
                    var response = await fetch('/api/v1/users/me', {
                        method: 'GET',
                        headers: getAuthHeaders()
                    });

                    console.log('[Auth] Response status:', response.status);

                    if (response.ok) {
                        var data = await response.json();
                        console.log('[Auth] User info:', data);
                        return { isLoggedIn: true, userInfo: data };
                    } else {
                        console.log('[Auth] Token invalid, clearing...');
                        localStorage.removeItem('access_token');
                        localStorage.removeItem('login_time');
                        return { isLoggedIn: false, userInfo: null };
                    }
                } catch (error) {
                    console.error('[Auth] Error:', error);
                    return { isLoggedIn: false, userInfo: null };
                }
            };

            // 获取任务列表
            var fetchTasks = async function() {
                console.log('[Tasks] Fetching tasks...');
                console.log('[Tasks] Is superuser:', userInfo.value.is_superuser);

                isLoadingTasks.value = true;

                try {
                    var apiUrl = userInfo.value.is_superuser ? '/api/v1/tasks/' : '/api/v1/tasks/me';
                    console.log('[Tasks] API URL:', apiUrl);

                    var response = await fetch(apiUrl, {
                        method: 'GET',
                        headers: getAuthHeaders()
                    });

                    console.log('[Tasks] Response status:', response.status);

                    if (response.ok) {
                        var data = await response.json();
                        console.log('[Tasks] Data:', data);

                        if (userInfo.value.is_superuser) {
                            tasks.value = data.data || [];
                        } else {
                            var allTasks = data.data || [];
                            tasks.value = allTasks.filter(function(t) { return !t.is_delete; });
                        }
                        console.log('[Tasks] Tasks count:', tasks.value.length);
                    } else {
                        var errorText = await response.text();
                        console.error('[Tasks] Error response:', errorText);
                        try {
                            var errorData = JSON.parse(errorText);
                            showAlert(errorData.detail || '获取任务列表失败', 'error');
                        } catch (e) {
                            showAlert('获取任务列表失败: ' + response.status, 'error');
                        }
                    }
                } catch (error) {
                    console.error('[Tasks] Fetch error:', error);
                    showAlert('获取任务列表失败: ' + error.message, 'error');
                } finally {
                    isLoadingTasks.value = false;
                }
            };

            // 创建任务
            var createTask = async function() {
                if (!taskForm.value.task_name || !taskForm.value.task_group) {
                    showAlert('请填写必填项', 'error');
                    return;
                }

                console.log('[Tasks] Creating task:', taskForm.value);
                isSubmitting.value = true;

                try {
                    var response = await fetch('/api/v1/tasks/', {
                        method: 'POST',
                        headers: getAuthHeaders(),
                        body: JSON.stringify(taskForm.value)
                    });

                    console.log('[Tasks] Create response status:', response.status);

                    if (response.ok) {
                        var data = await response.json();
                        console.log('[Tasks] Created task:', data);
                        showAlert('任务创建成功！');
                        resetForm();
                        await fetchTasks();
                        setActiveNav('view-tasks');
                    } else {
                        var errorText = await response.text();
                        console.error('[Tasks] Create error:', errorText);
                        try {
                            var errorData = JSON.parse(errorText);
                            showAlert(errorData.detail || '创建失败', 'error');
                        } catch (e) {
                            showAlert('创建任务失败: ' + response.status, 'error');
                        }
                    }
                } catch (error) {
                    console.error('[Tasks] Create exception:', error);
                    showAlert('创建任务时发生错误: ' + error.message, 'error');
                } finally {
                    isSubmitting.value = false;
                }
            };

            // 启动任务
            var startTask = async function(taskId) {
                console.log('[Tasks] Starting task:', taskId);

                try {
                    var response = await fetch('/api/v1/tasks/' + taskId + '/begin/', {
                        method: 'PATCH',
                        headers: getAuthHeaders()
                    });

                    console.log('[Tasks] Start response status:', response.status);

                    if (response.ok) {
                        showAlert('任务已启动');
                        await fetchTasks();
                    } else {
                        var errorText = await response.text();
                        console.error('[Tasks] Start error:', errorText);
                        try {
                            var errorData = JSON.parse(errorText);
                            showAlert(errorData.detail || '启动失败', 'error');
                        } catch (e) {
                            showAlert('启动任务失败: ' + response.status, 'error');
                        }
                    }
                } catch (error) {
                    console.error('[Tasks] Start exception:', error);
                    showAlert('启动任务时发生错误: ' + error.message, 'error');
                }
            };

            // 停止任务
            var stopTask = async function(taskId) {
                console.log('[Tasks] Stopping task:', taskId);

                try {
                    var response = await fetch('/api/v1/tasks/' + taskId + '/stop/', {
                        method: 'PATCH',
                        headers: getAuthHeaders()
                    });

                    console.log('[Tasks] Stop response status:', response.status);

                    if (response.ok) {
                        showAlert('任务已停止');
                        await fetchTasks();
                    } else {
                        var errorText = await response.text();
                        console.error('[Tasks] Stop error:', errorText);
                        try {
                            var errorData = JSON.parse(errorText);
                            showAlert(errorData.detail || '停止失败', 'error');
                        } catch (e) {
                            showAlert('停止任务失败: ' + response.status, 'error');
                        }
                    }
                } catch (error) {
                    console.error('[Tasks] Stop exception:', error);
                    showAlert('停止任务时发生错误: ' + error.message, 'error');
                }
            };

            // 删除任务
            var deleteTask = async function(taskId) {
                if (!confirm('确定要删除该任务吗？')) return;

                console.log('[Tasks] Deleting task:', taskId);

                try {
                    var response = await fetch('/api/v1/tasks/' + taskId + '/remove/', {
                        method: 'PATCH',
                        headers: getAuthHeaders()
                    });

                    console.log('[Tasks] Delete response status:', response.status);

                    if (response.ok) {
                        showAlert('任务已删除');
                        await fetchTasks();
                    } else {
                        var errorText = await response.text();
                        console.error('[Tasks] Delete error:', errorText);
                        try {
                            var errorData = JSON.parse(errorText);
                            showAlert(errorData.detail || '删除失败', 'error');
                        } catch (e) {
                            showAlert('删除任务失败: ' + response.status, 'error');
                        }
                    }
                } catch (error) {
                    console.error('[Tasks] Delete exception:', error);
                    showAlert('删除任务时发生错误: ' + error.message, 'error');
                }
            };

            // 重置表单
            var resetForm = function() {
                taskForm.value = {
                    task_name: '',
                    task_group: '',
                    source_platform: '',
                    task_content: {
                        target_url: '',
                        keywords: '',
                        description: ''
                    }
                };
            };

            // 页面初始化
            onMounted(async function() {
                console.log('[Init] Page mounted, checking auth...');

                // 读取 URL 参数设置默认导航
                var urlParams = new URLSearchParams(window.location.search);
                var navParam = urlParams.get('nav');
                if (navParam === 'create-task' || navParam === 'view-tasks') {
                    activeNav.value = navParam;
                }

                try {
                    var result = await checkAuth();
                    console.log('[Init] Auth result:', result);

                    isLoggedIn.value = result.isLoggedIn;
                    userInfo.value = result.userInfo || {};

                    if (result.isLoggedIn) {
                        loginTime.value = PaYiPa.Auth.getLoginTime();
                        console.log('[Init] User logged in, fetching tasks...');
                        await fetchTasks();
                    } else {
                        console.log('[Init] User not logged in');
                    }
                } catch (error) {
                    console.error('[Init] Error:', error);
                } finally {
                    isLoading.value = false;
                }
            });

            return {
                isLoading: isLoading,
                isLoggedIn: isLoggedIn,
                userInfo: userInfo,
                loginTime: loginTime,
                activeNav: activeNav,
                tasks: tasks,
                taskForm: taskForm,
                isLoadingTasks: isLoadingTasks,
                isSubmitting: isSubmitting,
                alertMessage: alertMessage,
                alertType: alertType,
                setActiveNav: setActiveNav,
                getStatusText: getStatusText,
                getStatusClass: getStatusClass,
                formatDate: formatDate,
                createTask: createTask,
                startTask: startTask,
                stopTask: stopTask,
                deleteTask: deleteTask,
                resetForm: resetForm
            };
        }
    });

    PaYiPaComponents.registerComponents(app);
    app.mount('#app');
</script>
</body>
</html>
