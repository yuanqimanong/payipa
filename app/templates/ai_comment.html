<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>AI 评论 - PaYiPa</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        /* Layout Styles */
        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1a1f36 0%, #252b47 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4361ee 0%, #7c3aed 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .sidebar-logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 0;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 8px;
        }

        .nav-section-title {
            padding: 8px 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            gap: 12px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .nav-item.active {
            background: rgba(67, 97, 238, 0.15);
            color: #fff;
            border-left-color: #4361ee;
        }

        .nav-item-icon {
            width: 20px;
            text-align: center;
            font-size: 1rem;
        }

        .nav-item-text {
            flex: 1;
            font-size: 0.9rem;
        }

        .nav-item-arrow {
            font-size: 0.7rem;
            transition: transform 0.3s ease;
        }

        .nav-item-arrow.expanded {
            transform: rotate(90deg);
        }

        .nav-submenu {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease;
        }

        .nav-submenu.expanded {
            max-height: 200px;
        }

        .nav-submenu .nav-item {
            padding-left: 52px;
            font-size: 0.85rem;
        }

        /* Main Content Styles */
        .main-wrapper {
            flex: 1;
            margin-left: 260px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Header Styles */
        .top-header {
            background: #fff;
            padding: 16px 30px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .user-info-section {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .login-time {
            color: #6c757d;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .login-time-icon {
            font-size: 1rem;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: #f8f9fa;
            border-radius: 30px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #4361ee 0%, #7c3aed 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .user-details {
            text-align: left;
        }

        .user-name {
            font-weight: 600;
            color: #212529;
            font-size: 0.9rem;
        }

        .user-role {
            font-size: 0.75rem;
            color: #6c757d;
        }

        .logout-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .logout-btn:hover {
            background: #f72585;
            border-color: #f72585;
            color: #fff;
        }

        /* AI Comment Content */
        .ai-comment-container {
            flex: 1;
            padding: 30px;
            background: #f0f2f5;
        }

        .page-title {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .page-title h1 {
            font-size: 1.75rem;
            color: #212529;
            margin: 0;
        }

        .back-btn {
            padding: 8px 16px;
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            color: #6c757d;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #4361ee;
            border-color: #4361ee;
            color: #fff;
        }

        /* Iframe Container */
        .iframe-wrapper {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            height: calc(100vh - 200px);
            position: relative;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Loading State */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #4361ee;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .sidebar {
                width: 0;
                overflow: hidden;
            }

            .sidebar.mobile-open {
                width: 260px;
            }

            .main-wrapper {
                margin-left: 0;
            }

            .ai-comment-container {
                padding: 20px;
            }

            .iframe-wrapper {
                height: calc(100vh - 160px);
            }
        }
    </style>
</head>
<body>
<div id="app">
    <!-- 未登录状态 -->
    <div class="container" v-if="!isLoggedIn">
        <div class="login-prompt">
            <div class="header">
                <h1 style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--danger-color);">🔒</h1>
                <h2 style="font-size: 1.75rem; margin-bottom: 1rem; color: var(--dark-text);">需要登录</h2>
                <p class="welcome-message" style="font-size: 1.1rem;">请先登录以访问此页面</p>
            </div>
            <div style="margin-top: 2rem;">
                <a class="btn btn-primary" href="/login" style="padding: 12px 30px; font-size: 16px;">前往登录</a>
            </div>
        </div>
    </div>

    <!-- 已登录状态 - 带侧边栏布局 -->
    <div class="app-layout" v-else>
        <!-- 左侧导航侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">📊</div>
                    <span class="sidebar-logo-text">PaYiPa</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <!-- 基础功能 -->
                <div class="nav-section">
                    <div class="nav-section-title">基础功能</div>
                    <!-- Dashboard -->
                    <a class="nav-item" href="/index">
                        <span class="nav-item-icon">🏠</span>
                        <span class="nav-item-text">Dashboard</span>
                    </a>
                    <!-- 任务管理 - 二级菜单 -->
                    <div @click="toggleSubmenu('task')" class="nav-item">
                        <span class="nav-item-icon">📋</span>
                        <span class="nav-item-text">任务管理</span>
                        <span :class="{ expanded: expandedMenus.task }" class="nav-item-arrow">▶</span>
                    </div>
                    <div :class="{ expanded: expandedMenus.task }" class="nav-submenu">
                        <a class="nav-item" href="/task?nav=create-task">
                            <span class="nav-item-text">新建任务</span>
                        </a>
                        <a class="nav-item" href="/task?nav=view-tasks">
                            <span class="nav-item-text">查看任务</span>
                        </a>
                    </div>
                    <!-- 数据查询 -->
                    <a class="nav-item" href="/data">
                        <span class="nav-item-icon">🔍</span>
                        <span class="nav-item-text">数据查询</span>
                    </a>
                    <!-- AI 评论 -->
                    <a class="nav-item active" href="/ai_comment">
                        <span class="nav-item-icon">🤖</span>
                        <span class="nav-item-text">AI 评论</span>
                    </a>
                </div>

                <!-- 系统管理 - 仅管理员可见 -->
                <div class="nav-section" v-if="userInfo.is_superuser">
                    <div class="nav-section-title">系统管理</div>
                    <div @click="toggleSubmenu('system')" class="nav-item">
                        <span class="nav-item-icon">⚙️</span>
                        <span class="nav-item-text">系统管理</span>
                        <span :class="{ expanded: expandedMenus.system }" class="nav-item-arrow">▶</span>
                    </div>
                    <div :class="{ expanded: expandedMenus.system }" class="nav-submenu">
                        <div class="nav-item">
                            <span class="nav-item-text">爬虫模块</span>
                        </div>
                        <a class="nav-item" href="/users">
                            <span class="nav-item-text">用户管理</span>
                        </a>
                        <a class="nav-item" href="/log_view">
                            <span class="nav-item-text">日志查看</span>
                        </a>
                    </div>
                </div>

                <!-- 个人设置 - 所有用户可见 -->
                <div class="nav-section">
                    <div class="nav-section-title">个人中心</div>
                    <a class="nav-item" href="/profile">
                        <span class="nav-item-icon">👤</span>
                        <span class="nav-item-text">个人设置</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- 右侧主内容区 -->
        <div class="main-wrapper">
            <!-- 顶部栏 -->
            <header class="top-header">
                <div class="user-info-section">
                    <div class="login-time">
                        <span class="login-time-icon">🕐</span>
                        <span>登录时间：{{ loginTime }}</span>
                    </div>
                    <div class="user-profile">
                        <div class="user-avatar">{{ userAvatar }}</div>
                        <div class="user-details">
                            <div class="user-name">{{ userInfo.full_name || userInfo.email }}</div>
                            <div class="user-role">{{ userInfo.is_superuser ? '管理员' : '普通用户' }}</div>
                        </div>
                    </div>
                    <button @click="logout" class="logout-btn">退出登录</button>
                </div>
            </header>

            <!-- AI 评论内容区 -->
            <main class="ai-comment-container">
                <div class="page-title">
                    <a class="back-btn" href="/index">
                        <span>←</span>
                        <span>返回首页</span>
                    </a>
                    <h1>🤖 AI 评论</h1>
                </div>

                <div class="iframe-wrapper" v-loading="loading">
                    <iframe
                            @error="onIframeError"
                            @load="onIframeLoad"
                            class="iframe-container"
                            frameborder="0"
                            src="http://192.168.14.60:23333/index">
                    </iframe>

                    <!-- 加载提示 -->
                    <div class="loading-overlay" v-if="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
        setup() {
            const isLoggedIn = ref(false);
            const userInfo = ref({});
            const loginTime = ref('');
            const expandedMenus = ref({
                task: false,
                system: false
            });
            // 初始化时设置加载状态，等待认证完成
            const loading = ref(true);

            // 计算属性
            const userAvatar = computed(() => {
                const name = userInfo.value.full_name || userInfo.value.email || '';
                return name.charAt(0).toUpperCase();
            });

            // 展开/收起子菜单
            const toggleSubmenu = (menu) => {
                expandedMenus.value[menu] = !expandedMenus.value[menu];
            };

            // iframe 加载完成 - 仅用于调试，不改变 loading 状态
            const onIframeLoad = () => {
                console.log('iframe 加载完成');
            };

            // iframe 加载错误 - 仅用于调试，不改变 loading 状态
            const onIframeError = () => {
                console.error('iframe 加载失败');
            };

            // 检查登录状态
            const checkAuth = async () => {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    isLoggedIn.value = false;
                    window.location.href = '/login';
                    return;
                }

                try {
                    // 并行获取用户信息和设置登录时间
                    const [userResponse, loginTimePromise] = await Promise.all([
                        fetch('/api/v1/users/me', {
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        }),
                        Promise.resolve(localStorage.getItem('login_time'))
                    ]);
                    
                    if (userResponse.ok) {
                        userInfo.value = await userResponse.json();
                        isLoggedIn.value = true;
                        
                        // 设置登录时间
                        if (loginTimePromise) {
                            loginTime.value = new Date(parseInt(loginTimePromise)).toLocaleString('zh-CN');
                        }
                    } else {
                        throw new Error('认证失败');
                    }
                } catch (error) {
                    console.error('认证检查失败:', error);
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('login_time');
                    window.location.href = '/login';
                } finally {
                    // 认证完成后关闭加载状态
                    loading.value = false;
                }
            };

            // 登出
            const logout = () => {
                localStorage.removeItem('access_token');
                localStorage.removeItem('login_time');
                isLoggedIn.value = false;
                window.location.href = '/login';
            };

            onMounted(() => {
                // 立即开始认证检查
                checkAuth();
            });

            return {
                isLoggedIn,
                userInfo,
                userAvatar,
                loginTime,
                expandedMenus,
                loading,
                toggleSubmenu,
                onIframeLoad,
                onIframeError,
                logout
            };
        }
    }).mount('#app');
</script>
</body>
</html>
